# Pre-approved lint-rule exceptions, used by the hook resolver to auto-approve
# `ask_user` questions of class `lint_exception` without escalating to a human.
#
# Each entry is a dict with:
#   rule:       the linter rule id (e.g. "E501", "no-unused-vars")
#   linter:     the linter name (e.g. "ruff", "eslint") — optional
#   path_glob:  file path glob where the exception is allowed — optional
#   reason:     short reason returned to the agent
#
# Edit this file freely. aidor will never overwrite it after bootstrap.
#
# The defaults below are intentionally conservative and apply to any Python
# repo. Trim, extend, or replace them per project — anything not listed here
# (or explicitly rejected by the agent) will escalate to a human via
# `ask_user`. Common additions:
#   - ESLint:   `no-unused-vars` in test/spec files
#   - mypy:     `no-untyped-def` in legacy modules during incremental typing
#   - bandit:   `B101` (assert in non-test code) on a narrow path

exceptions:
  # ---- Generally-safe Ruff defaults for any Python project -------------
  - rule: E501
    linter: ruff
    path_glob: "**/*"
    reason: >-
      Long URL literals, long error strings, and long test fixtures are more
      readable on a single line than wrapped. The formatter (`ruff format`)
      already enforces the configured line length for normal code.
  - rule: B008
    linter: ruff
    path_glob: "**/*"
    reason: >-
      Common framework APIs (Typer `Option(...)`, Click `Argument(...)`,
      FastAPI `Depends(...)`) require function-call defaults; rewriting them
      breaks the framework contract.
  - rule: SIM102
    linter: ruff
    path_glob: "**/*"
    reason: >-
      Nested `if` statements are sometimes clearer than a combined boolean
      expression when each level expresses a distinct responsibility.
  - rule: SIM105
    linter: ruff
    path_glob: "**/*"
    reason: >-
      `contextlib.suppress` hides the exception type from the reader; an
      explicit `try/except: pass` is clearer for one-off defensive code.
  - rule: SIM117
    linter: ruff
    path_glob: "**/*"
    reason: >-
      Combined `with` statements sometimes harm readability when the inner
      context manager depends on side effects of the outer one.

  # ---- Test-only defaults ---------------------------------------------
  - rule: B011
    linter: ruff
    path_glob: "tests/**/*"
    reason: >-
      Bare `assert` is the idiomatic way to express pytest assertions; the
      `-O` Python flag is never used for the test run.
  - rule: S101
    linter: ruff
    path_glob: "tests/**/*"
    reason: >-
      `assert` is the standard pytest assertion; the bandit/Ruff S101
      "assert detected" warning does not apply to test code.
  - rule: ARG001
    linter: ruff
    path_glob: "tests/**/*"
    reason: >-
      Unused function arguments are common in pytest fixtures (e.g. fixture
      injected purely for its setup/teardown side effects).
