repos:
  - repo: local
    hooks:
      # All four hooks shell out through `scripts/precommit_shim.py`,
      # which re-execs into the repo-local `.venv` interpreter. This
      # keeps the gate hermetic: pre-commit can be launched from any
      # `python` on PATH and the hooks still resolve `aidor`,
      # `pip_audit`, `ruff`, and `pytest` from the project venv. See
      # the docstring in `scripts/precommit_shim.py` (regression for
      # review-0001).
      - id: ruff-check
        name: ruff (lint)
        entry: python scripts/precommit_shim.py -m ruff check
        language: system
        types: [python]
        pass_filenames: false
        args: [src, tests]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff (format check)
        entry: python scripts/precommit_shim.py -m ruff format --check
        language: system
        types: [python]
        pass_filenames: false
        args: [src, tests]
        stages: [pre-commit]
      - id: pyright
        name: pyright (static type check)
        entry: python scripts/precommit_shim.py -m pyright
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      - id: pip-audit
        name: pip-audit (supply-chain vulnerability scan)
        entry: python scripts/precommit_shim.py -m pip_audit --skip-editable
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pytest
        name: pytest (fast test suite)
        # Enforce the ≥90 % line-coverage floor from AGENTS.md on pre-commit,
        # matching the CI job so drift is caught before PRs open.
        entry: python scripts/precommit_shim.py -m pytest -q --cov=aidor --cov-fail-under=90
        language: system
        pass_filenames: false
        stages: [pre-commit]
