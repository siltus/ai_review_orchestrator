repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: python -m ruff check
        language: system
        types: [python]
        pass_filenames: false
        args: [src, tests]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff (format check)
        entry: python -m ruff format --check
        language: system
        types: [python]
        pass_filenames: false
        args: [src, tests]
        stages: [pre-commit]
      - id: pip-audit
        name: pip-audit (supply-chain vulnerability scan)
        entry: python -m pip_audit --skip-editable
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pytest
        name: pytest (fast test suite)
        # Enforce the ≥90 % line-coverage floor from AGENTS.md on pre-commit,
        # matching the CI job so drift is caught before PRs open.
        entry: python -m pytest -q --cov=aidor --cov-fail-under=90
        language: system
        pass_filenames: false
        stages: [pre-commit]
