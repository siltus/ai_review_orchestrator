repos:
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (supply-chain vulnerability scan)
        entry: python -m pip_audit --skip-editable
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # Audits the active environment's installed packages against the
        # PyPI advisory database. Required by AGENTS.md baseline #1.
      - id: pytest
        name: pytest (fast test suite)
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        stages: [pre-commit]
